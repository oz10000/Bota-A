name: Run KuCoin Bot Simulation Persistent

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"  # Ejecuta cada 5 minutos para subir reportes

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3️⃣ Instalar dependencias
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ Ejecutar bot de forma persistente en background
      - name: Run bot persistently
        run: |
          mkdir -p reports
          nohup python bot.py > bot.log 2>&1 &

      # 5️⃣ Subir reportes acumulados cada 5 minutos
      - name: Upload accumulated reports
        uses: actions/upload-artifact@v4
        with:
          name: kucoin-bot-reports
          path: reports/
