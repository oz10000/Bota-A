name: Run KuCoin Bot Simulation

on:
  workflow_dispatch:       # Lanzamiento manual
  schedule:
    - cron: "*/10 * * * *" # Opcional: iniciar cada 10 minutos

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30      # Tiempo suficiente para generar reportes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot and wait for first report
        run: |
          echo "Starting KuCoin Bot..."
          python - <<'EOF'
import subprocess, time, os

# Ejecutar bot en segundo plano
bot_process = subprocess.Popen(["python", "bot.py"])

# Esperar suficiente para que se genere el primer reporte
time.sleep(310)  # 5+ minutos según REPORT_INTERVAL

# Terminar bot
bot_process.terminate()
bot_process.wait()
EOF

      - name: Upload generated reports
        uses: actions/upload-artifact@v4
        with:
          name: kucoin-bot-reports
          path: reports/
