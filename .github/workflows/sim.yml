name: Run KuCoin Bot Live

on:
  workflow_dispatch:  # Lanzamiento manual
  schedule:
    - cron: "*/10 * * * *"  # Opcional: cada 10 min para iniciar una sesión

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Evita que GitHub lo cierre prematuramente
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot live
        run: |
          echo "Starting KuCoin Bot loop..."
          python bot.py  # Corre en foreground, logs visibles en Actions
