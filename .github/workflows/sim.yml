name: Run KuCoin Bot Live Persistent

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # Opcional, lanza cada 10 min

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # suficiente para sesiones largas
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot live with periodic report upload
        run: |
          echo "Starting KuCoin Bot loop..."
          # Loop que sube reportes cada 5 min sin interrumpir el bot
          python - <<'EOF'
import subprocess, time, os
REPORT_INTERVAL = 300
while True:
    if not hasattr(globals(), "bot_started"):
        globals()["bot_started"] = True
        subprocess.Popen(["python", "bot.py"])
    time.sleep(REPORT_INTERVAL)
    if os.path.exists("reports/"):
        subprocess.run([
            "gh", "workflow", "upload-artifact",
            "--name", "kucoin-bot-reports",
            "--path", "reports/"
        ])
EOF
