name: Run KuCoin Bot Live Persistent

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # Opcional

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: |
          echo "Starting KuCoin Bot..."
          python bot.py &      # Corre en background
          BOT_PID=$!
          sleep 300            # Espera 5 min (o el tiempo que quieras)
          kill $BOT_PID || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: kucoin-bot-reports
          path: reports/
