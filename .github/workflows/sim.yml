name: Quant Bot Simulation 24/7

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"  # ejecuta cada 5 minutos

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3️⃣ Instalar dependencias
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4️⃣ Ejecutar bot.py (loop infinito)
      - name: Run bot
        run: python bot.py

      # 5️⃣ Subir reportes acumulativos cada 5 minutos
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: quant-bot-reports
          path: reports/
