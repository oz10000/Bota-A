name: Crypto Quant Bot

on:

  workflow_dispatch:

  schedule:
    - cron: "*/5 * * * *"

jobs:

  run-bot:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: setup python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: install libs
      run: |
        pip install pandas numpy requests

    - name: run bot
      run: |
        python scanner_bot.py

    - name: upload logs
      uses: actions/upload-artifact@v4
      with:
        name: bot-data
        path: |
          trades_log.csv
          metrics.json
          bot_log.txt
          state.json
